<section id="hobbies" class="section-container">
  <h2 class="section-title" data-aos="fade-right"><span>03.5</span> Beyond the Code</h2>

  <div class="showcase-container" data-aos="fade-up">
    
    <div class="showcase-menu">
      @for (activity of activities; track activity.title; let i = $index) {
        <div 
          class="menu-item" 
          [class.active]="activeIndex() === i"
          (mouseenter)="setActive(i)">
          
          <span class="nav-number">0{{ i + 1 }}</span>
          <h3 class="nav-text">{{ activity.title }}</h3>
          <div class="nav-line"></div>
          
        </div>
      }
    </div>

    <div class="showcase-stage">
      <div class="stage-content">
        <div class="stage-watermark">{{ activeActivity().icon }}</div>
        
        <div class="stage-foreground">
          <div class="stage-icon">{{ activeActivity().icon }}</div>
          <h4 class="stage-title">{{ activeActivity().title }}</h4>
          <p class="stage-desc">{{ activeActivity().description }}</p>
        </div>
      </div>
    </div>

  </div>
</section>
